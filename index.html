<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asesor de Convivencia Escolar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('fondo_estudiantes.jpg');
    background-size:cover;
}

/* CONTENEDOR */
.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:20px;
}

/* TITULO */
h1{text-align:center;}

/* INPUTS */
input, textarea, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BOTONES */
button{
    background:#f4c400;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    transition:0.2s;
}

button:hover{background:#ffd633;}
button:active{transform:scale(0.9);}

/* RESULTADO */
#resultado{
    margin-top:20px;
    padding:20px;
    background:#f4f4f4;
    border-radius:10px;
    white-space:pre-wrap;
}

/* PROGRESO */
#barra{height:8px;background:#ddd;border-radius:5px;}
#progreso{height:100%;width:0%;background:#3b82f6;}
</style>
</head>

<body>

<div class="container">

<h1>Asesor de Convivencia Escolar</h1>

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option value="">Seleccione el grado</option>
<option>Pre-escolar</option>
<option>1°</option><option>2°</option><option>3°</option>
<option>4°</option><option>5°</option>
<option>6°1</option><option>6°2</option>
<option>7°1</option><option>7°2</option>
<option>8°1</option><option>8°2</option>
<option>9°1</option><option>9°2</option><option>9°3</option>
<option>10°1</option><option>10°2</option>
<option>11°1</option><option>11°2</option>
</select>

<textarea id="caso" rows="5" placeholder="Describa el caso"></textarea>

<button onclick="analizar()">Analizar</button>

<div id="barra"><div id="progreso"></div></div>

<div id="resultado"></div>

<!-- BOTONES -->
<div>
<button onclick="editar()">Editar</button>
<button onclick="guardar()">Guardar</button>
<button onclick="pdf()">PDF</button>
<button onclick="citacion()">Citación</button>
<button onclick="historial()">Historial</button>
</div>

</div>

<script>

const { jsPDF } = window.jspdf;
const URL = "https://consulta-backend-eg98.onrender.com";

async function analizar(){

let nombre = document.getElementById("nombre").value;
let grado = document.getElementById("grado").value;
let caso = document.getElementById("caso").value;

if(!nombre || !grado || !caso){
alert("Completa todos los campos");
return;
}

progreso.style.width="40%";
resultado.innerText="Analizando...";

try{

let res = await fetch(URL+"/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre, grado, caso})
});

progreso.style.width="80%";

let data = await res.json();

progreso.style.width="100%";

resultado.innerText =
`ACTA DE CONVIVENCIA

Institución Educativa Técnico Empresarial Manuel Quintero Penilla

Estudiante: ${nombre}
Grado: ${grado}

Descripción del caso:
${caso}

${data.resultado}`;

}catch{
resultado.innerText="Servidor iniciando...";
}

}

/* FUNCIONES */

function editar(){
resultado.contentEditable = true;
alert("Ahora puedes editar el acta");
}

function guardar(){
localStorage.setItem("acta", resultado.innerText);
alert("Acta guardada");
}

function pdf(){
let doc = new jsPDF();
doc.text(resultado.innerText,10,10);
doc.save("acta.pdf");
}

function citacion(){
let doc = new jsPDF();
doc.text("CITACIÓN A ACUDIENTE",20,20);
doc.text("Se solicita presencia del acudiente.",20,40);
doc.save("citacion.pdf");
}

async function historial(){
let res = await fetch(URL+"/casos");
let data = await res.json();

let texto="HISTORIAL\n\n";

data.reverse().forEach(c=>{
texto += `Nombre: ${c.nombre}
Grado: ${c.grado}
Tipo: ${c.tipo}
Fecha: ${c.fecha}

------------------
`;
});

resultado.innerText = texto;
}

</script>

</body>
</html>
