<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asesor de Convivencia Escolar</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('fondo_estudiantes.jpg');
    background-size: cover;
    color:#fff;
}

/* CONTENEDOR */
.container{
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.95);
    padding:30px;
    border-radius:20px;
    color:#000;
}

/* TITULO */
h1{
    text-align:center;
}

/* INPUTS */
input, textarea, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

/* BOTONES */
button{
    background:#f4c400;
    border:none;
    padding:12px 20px;
    font-size:16px;
    margin:10px 5px;
    border-radius:8px;
    cursor:pointer;
    transition: all 0.2s;
}

button:hover{
    background:#ffd633;
}

button:active{
    transform: scale(0.92);
}

/* RESULTADO */
#resultado{
    background:#fff;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    white-space: pre-wrap;
}

/* BARRA PROGRESO */
#barra{
    width:100%;
    height:8px;
    background:#ddd;
    border-radius:5px;
    margin-top:10px;
    overflow:hidden;
}

#progreso{
    height:100%;
    width:0%;
    background:#3b82f6;
    transition: width 0.5s;
}

/* BOTONES EXTRA */
.botones{
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>Asesor de Convivencia Escolar</h1>

<p><b>Instrucciones:</b><br>
1. Ingrese el nombre<br>
2. Seleccione el grado<br>
3. Describa el caso<br>
4. Presione analizar
</p>

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option value="">Seleccione el grado</option>
<option>Pre-escolar</option>
<option>1°</option>
<option>2°</option>
<option>3°</option>
<option>4°</option>
<option>5°</option>
<option>6°1</option>
<option>6°2</option>
<option>7°1</option>
<option>7°2</option>
<option>8°1</option>
<option>8°2</option>
<option>9°1</option>
<option>9°2</option>
<option>9°3</option>
<option>10°1</option>
<option>10°2</option>
<option>11°1</option>
<option>11°2</option>
</select>

<textarea id="caso" rows="5" placeholder="Describa el caso"></textarea>

<button onclick="analizar()">Analizar</button>

<div id="barra"><div id="progreso"></div></div>

<div id="resultado"></div>

<div class="botones">
<button onclick="editar()">Editar</button>
<button onclick="guardar()">Guardar</button>
<button onclick="descargarPDF()">Descargar PDF</button>
<button onclick="citar()">Citación</button>
</div>

</div>

<script>

const URL = "https://consulta-backend-eg98.onrender.com";

async function analizar(){

    let nombre = document.getElementById("nombre").value;
    let grado = document.getElementById("grado").value;
    let caso = document.getElementById("caso").value;

    if(!nombre || !grado || !caso){
        alert("Completa todos los campos");
        return;
    }

    // PROGRESO
    document.getElementById("progreso").style.width="30%";
    document.getElementById("resultado").innerText="⏳ Analizando caso...";

    try{

        const res = await fetch(URL+"/analizar",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({nombre, grado, caso})
        });

        document.getElementById("progreso").style.width="70%";

        const data = await res.json();

        document.getElementById("progreso").style.width="100%";

        document.getElementById("resultado").innerText = `
ACTA DE CONVIVENCIA

Institución Educativa Técnico Empresarial Manuel Quintero Penilla

Estudiante: ${nombre}
Grado: ${grado}

Descripción del caso:
${caso}

${data.resultado}
        `;

    }catch(e){
        document.getElementById("resultado").innerText="⚠️ Servidor iniciando...";
    }
}

/* BOTONES */

function editar(){
    document.getElementById("resultado").contentEditable = true;
    alert("Ahora puedes editar el texto");
}

function guardar(){
    alert("Documento guardado (simulado)");
}

function descargarPDF(){
    let contenido = document.getElementById("resultado").innerText;

    let ventana = window.open('', '', 'height=600,width=800');
    ventana.document.write('<pre>'+contenido+'</pre>');
    ventana.print();
}

function citar(){
    alert("Citación generada para acudiente");
}

</script>

</body>
</html>
