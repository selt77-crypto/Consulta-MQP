<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convivencia Escolar MQP</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Segoe UI';
background:linear-gradient(rgba(15,42,68,0.85), rgba(30,58,95,0.85)),
url("fondo_estudiantes.jpg");
background-size:cover;
}
.card{
background:rgba(255,255,255,0.95);
padding:15px;
border-radius:15px;
}
.btn{
background:#e5e7eb;
padding:6px 12px;
border-radius:10px;
font-weight:bold;
}
.hoja{
background:white;
padding:40px;
margin-top:20px;
position:relative;
}
.hoja::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:300px;
background:url("escudo.png") no-repeat center;
opacity:0.08;
}
</style>
</head>

<body class="p-4">

<div class="card max-w-4xl mx-auto">

<h2 class="text-center font-bold">CONVIVENCIA ESCOLAR</h2>

<input id="estudiante" placeholder="Estudiante" class="w-full p-2 border mb-2">
<input id="caso" placeholder="Caso" class="w-full p-2 border mb-2">

<button onclick="analizar()" class="bg-yellow-500 p-2 w-full">Analizar</button>

<div id="resultado" class="hoja hidden"></div>

<h3 class="mt-4 font-bold">Historial</h3>
<div id="historial"></div>

</div>

<script>

const URL = "https://TU_BACKEND.onrender.com";

async function analizar(){

let estudiante = document.getElementById("estudiante").value;
let caso = document.getElementById("caso").value;

const res = await fetch(URL+"/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({caso, estudiante})
});

const data = await res.json();

mostrar(data.respuesta);
cargarHistorial();
}

function mostrar(t){
resultado.innerHTML = `<p>${t.replace(/\n/g,"<br>")}</p>`;
resultado.classList.remove("hidden");
}

async function cargarHistorial(){

const res = await fetch(URL+"/historial");
const data = await res.json();

historial.innerHTML = data.map(c=>
`<div class="card mt-2">
<b>${c.estudiante}</b><br>${c.fecha}
</div>`
).join("");

}

</script>

</body>
</html>
