<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Convivencia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('fondo_estudiantes.jpg');
background-size:cover;
color:white;
}

#login{
text-align:center;
margin-top:120px;
}

.container{
display:none;
max-width:900px;
margin:30px auto;
background:white;
color:black;
padding:30px;
border-radius:20px;
}

input,textarea,select{
width:100%;
margin:10px 0;
padding:10px;
}

button{
background:gold;
border:none;
padding:10px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

#resultado{
margin-top:20px;
background:#f4f4f4;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Ingreso al sistema</h2>
<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div class="container" id="app">

<h2 id="rol"></h2>

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option value="">Seleccione grado</option>
<option>6°1</option><option>7°1</option>
<option>8°1</option><option>9°1</option>
<option>10°1</option><option>11°1</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<button onclick="analizar()">Analizar</button>
<button onclick="pdf()">PDF</button>
<button onclick="citacion()">Citación</button>
<button onclick="historial()">Historial</button>
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>
const { jsPDF } = window.jspdf;
const URL = "https://consulta-backend-eg98.onrender.com";

// 🔐 USUARIOS
const usuarios = {
docente:{pass:"123",rol:"Docente"},
coordinador:{pass:"123",rol:"Coordinador"},
rector:{pass:"123",rol:"Rector"}
};

function login(){
let u=user.value;
let p=pass.value;

if(usuarios[u] && usuarios[u].pass===p){
login.style.display="none";
app.style.display="block";
rol.innerText="Rol: "+usuarios[u].rol;
}else{
alert("Datos incorrectos");
}
}

// ANALIZAR
async function analizar(){
let nombre=document.getElementById("nombre").value;
let grado=document.getElementById("grado").value;
let caso=document.getElementById("caso").value;

let fecha=new Date().toLocaleDateString();

resultado.innerText="Analizando...";

let res=await fetch(URL+"/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre,grado,caso})
});

let data=await res.json();

resultado.innerText=
`ACTA DE CONVIVENCIA

INSTITUCIÓN EDUCATIVA

Fecha: ${fecha}

Estudiante: ${nombre}
Grado: ${grado}

Descripción:
${caso}

${data.resultado}

Firma Docente: __________
Firma Coordinador: __________
Firma Rector: __________`;
}

// PDF
function pdf(){
let doc=new jsPDF();

doc.addImage("escudo.png","PNG",85,10,30,30);

doc.text(resultado.innerText,10,50);

doc.setTextColor(200,200,200);
doc.text("INSTITUCIONAL",60,150,{angle:45});

doc.save("acta.pdf");
}

// CITACIÓN
function citacion(){
let doc=new jsPDF();

doc.addImage("escudo.png","PNG",85,10,30,30);

doc.text("CITACIÓN A PADRES",40,50);
doc.text("Estudiante: "+nombre.value,20,80);
doc.text("Motivo:",20,100);
doc.text(caso.value,20,110);

doc.text("Fecha: __________",20,140);

doc.save("citacion.pdf");
}

// HISTORIAL
async function historial(){
let res=await fetch(URL+"/casos");
let data=await res.json();

let texto="HISTORIAL\n\n";

data.reverse().forEach(c=>{
texto+=`${c.nombre} - ${c.fecha}\n`;
});

resultado.innerText=texto;
}

// BUSCAR
async function buscar(){
let n=prompt("Nombre estudiante");
let res=await fetch(URL+"/buscar/"+n);
let data=await res.json();

let texto="RESULTADOS\n\n";

data.forEach(c=>{
texto+=`${c.nombre} - ${c.fecha}\n${c.caso}\n\n`;
});

resultado.innerText=texto;
}
</script>

</body>
</html>
