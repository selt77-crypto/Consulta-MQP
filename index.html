<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asesor de Convivencia Escolar</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    background:white;
    color:black;
    max-width:700px;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

input, textarea, select{
    width:100%;
    margin:10px 0;
    padding:10px;
}

button{
    background:gold;
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

button:active{
    transform:scale(0.95);
}

#resultado{
    margin-top:20px;
    white-space:pre-wrap;
    background:#f4f4f4;
    padding:15px;
}
</style>
</head>

<body>

<h1>Asesor de Convivencia Escolar</h1>

<div class="container">

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option value="">Seleccione grado</option>
<option>Pre-escolar</option>
<option>1°</option>
<option>2°</option>
<option>3°</option>
<option>4°</option>
<option>5°</option>
<option>6°1</option>
<option>6°2</option>
<option>7°1</option>
<option>7°2</option>
<option>8°1</option>
<option>8°2</option>
<option>9°1</option>
<option>9°2</option>
<option>9°3</option>
<option>10°1</option>
<option>10°2</option>
<option>11°1</option>
<option>11°2</option>
</select>

<textarea id="caso" placeholder="Describa el caso de convivencia"></textarea>

<button onclick="analizar()">Analizar</button>

<div id="resultado"></div>

</div>

<script>

const URL = "https://consulta-backend-eg98.onrender.com";

async function analizar(){

let nombre = document.getElementById("nombre").value;
let grado = document.getElementById("grado").value;
let caso = document.getElementById("caso").value;

if(!nombre || !grado || !caso){
alert("Complete todos los campos");
return;
}

document.getElementById("resultado").innerText = "Analizando...";

try{

let res = await fetch(URL + "/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre, grado, caso})
});

let data = await res.json();

document.getElementById("resultado").innerText =
`ACTA DE CONVIVENCIA

Estudiante: ${nombre}
Grado: ${grado}

${data.resultado}`;

}catch{
document.getElementById("resultado").innerText =
"Error de conexión con el servidor. Intente nuevamente.";
}

}

</script>

</body>
</html>
