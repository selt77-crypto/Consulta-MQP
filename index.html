<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convivencia Escolar PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#1e3a8a;
margin:0;
color:white;
}
.container{
background:white;
color:black;
max-width:900px;
margin:auto;
padding:25px;
border-radius:12px;
margin-top:30px;
}
input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
}
button{
background:#f1c40f;
padding:10px;
border:none;
margin:5px;
border-radius:8px;
cursor:pointer;
}
#resultado,#citacion{
background:#f4f4f4;
padding:20px;
margin-top:15px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>Gestión de Convivencia Escolar</h2>

<input id="nombre" placeholder="Nombre estudiante">

<select id="grado">
<option>Pre-escolar</option><option>1°</option><option>2°</option>
<option>3°</option><option>4°</option><option>5°</option>
<option>6°1</option><option>7°1</option><option>8°1</option>
<option>9°1</option><option>10°1</option><option>11°1</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<label>Fecha citación</label>
<input type="date" id="fecha">

<label>Hora citación</label>
<input type="time" id="hora">

<button onclick="analizar()">Analizar</button>
<button onclick="generarCitacion()">Citación</button>
<button onclick="pdfActa()">PDF Acta</button>
<button onclick="pdfCitacion()">PDF Citación</button>

<div id="resultado"></div>
<div id="citacion"></div>

</div>

<script>

const { jsPDF } = window.jspdf;

// 🧠 ANALISIS
function analizar(){

let nombre=val("nombre");
let grado=val("grado");
let caso=val("caso");

if(!nombre||!caso){
alert("Complete todos los campos");
return;
}

let tipo="Tipo I – Situación leve";

if(/golpe|agredir|puño|patada/.test(caso.toLowerCase())){
tipo="Tipo III – Situación grave";
}
else if(/groser|reiter/.test(caso.toLowerCase())){
tipo="Tipo II – Convivencia";
}

let texto=`
ACTA DE CONVIVENCIA

Fecha: ${new Date().toLocaleDateString()}
Hora: ${new Date().toLocaleTimeString()}

Estudiante: ${nombre}
Grado: ${grado}

Descripción:
${caso}

Clasificación:
${tipo}

Fundamento legal:
Ley 1620 de 2013
Decreto 1965 de 2013

Firmas:

Docente: _______________________
Coordinación: __________________
Rectoría: ______________________
`;

document.getElementById("resultado").innerText=texto;
}

// 📩 CITACIÓN
function generarCitacion(){

let nombre=val("nombre");
let grado=val("grado");
let caso=val("caso");
let fecha=val("fecha");
let hora=val("hora");

if(!fecha||!hora){
alert("Ingrese fecha y hora");
return;
}

let texto=`
CITACIÓN A PADRES DE FAMILIA

Fecha: ${fecha}
Hora: ${hora}

Estudiante: ${nombre}
Grado: ${grado}

Motivo:
${caso}

Se solicita su asistencia para tratar la situación presentada.

Atentamente,

Docente: _______________________
Coordinación: __________________
Rectoría: ______________________
`;

document.getElementById("citacion").innerText=texto;
}

// 📄 PDF ACTA (FORMATO CORRECTO)
function pdfActa(){
crearPDF(document.getElementById("resultado").innerText,"acta");
}

// 📄 PDF CITACION
function pdfCitacion(){
crearPDF(document.getElementById("citacion").innerText,"citacion");
}

// 🧠 GENERADOR PDF PROFESIONAL
function crearPDF(texto,nombre){

let doc=new jsPDF();
doc.setFont("Times","Normal");
doc.setFontSize(11);

let lineas=doc.splitTextToSize(texto,170);
let y=30;

lineas.forEach(linea=>{
if(y>270){
doc.addPage();
y=20;
}
doc.text(linea,20,y);
y+=7;
});

doc.save(nombre+".pdf");
}

// helper
function val(id){
return document.getElementById(id).value.trim();
}

</script>

</body>
</html>
