<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convivencia Escolar MQP</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:'Segoe UI';
background:linear-gradient(rgba(15,42,68,0.85), rgba(30,58,95,0.85)),
url("fondo_estudiantes.jpg");
background-size:cover;
}

/* TARJETAS */
.card{
background:rgba(255,255,255,0.95);
padding:15px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BOTONES PRO */
button{
transition: all 0.15s ease;
}
button:active{
transform: scale(0.95);
box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
}
button:hover{
filter: brightness(0.95);
}

/* DOCUMENTO */
.hoja{
background:white;
width:21cm;
min-height:29.7cm;
margin:20px auto;
padding:2cm;
position:relative;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}
.hoja::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:300px;
background:url("escudo.png") no-repeat center;
background-size:contain;
opacity:0.07;
}

/* BARRA PROGRESO */
@keyframes progreso{
0%{width:0%;}
50%{width:80%;}
100%{width:100%;}
}
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="login" class="flex items-center justify-center h-screen">
<div class="card w-full max-w-sm text-center">

<img src="escudo.png" class="w-24 mx-auto mb-3">

<h2 class="font-bold mb-2">Ingreso Institucional</h2>

<select id="rol" class="w-full p-2 border mb-2">
<option value="">Seleccione rol</option>
<option>Docente</option>
<option>Directivo</option>
<option>Administrativo</option>
<option>Estudiante</option>
<option>Otro</option>
</select>

<input id="pass" type="password" placeholder="Contraseña" class="w-full p-2 border mb-2">

<button onclick="login()" class="bg-yellow-500 w-full p-2 font-bold">Ingresar</button>

<p id="error" class="text-red-500 mt-2"></p>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden max-w-5xl mx-auto">

<div class="card text-center mb-3">
<img src="escudo.png" class="w-16 mx-auto mb-2">
<h1 class="font-bold text-lg">INSTITUCIÓN EDUCATIVA MANUEL QUINTERO PENILLA</h1>
<p id="usuario"></p>
</div>

<div class="card text-sm mb-3">
<b>📘 Instrucciones:</b><br>
1. Ingrese el nombre del estudiante<br>
2. Describa el caso de convivencia<br>
3. Presione analizar<br>
4. Revise el acta generada<br>
5. Puede editar antes de usarla
</div>

<input id="estudiante" placeholder="Nombre del estudiante" class="w-full p-2 border mb-2">
<input id="caso" placeholder="Describe el caso" class="w-full p-2 border mb-2">

<button onclick="analizar()" class="bg-yellow-500 px-4 py-2 font-bold">Analizar</button>

<!-- LOADER PRO -->
<div id="loader" class="hidden mt-4">
<div id="textoLoader" style="color:white; font-weight:bold; margin-bottom:5px;">
🔄 Analizando caso...
</div>

<div style="width:100%; background:#ccc; border-radius:10px; overflow:hidden;">
<div style="
width:0%;
height:10px;
background:linear-gradient(90deg,#2563eb,#60a5fa);
animation:progreso 2s infinite;
"></div>
</div>
</div>

<!-- DOCUMENTO -->
<div id="preview" class="hoja hidden"></div>

<textarea id="editor" class="w-full h-40 mt-2 hidden border p-2"></textarea>

<div class="mt-2 flex gap-2 flex-wrap">
<button class="bg-gray-200 px-3 py-2 rounded" onclick="editar()">Editar</button>
<button class="bg-gray-300 px-3 py-2 rounded" onclick="guardar()">Guardar</button>
</div>

</div>

<script>

const URL = "https://consulta-backend-eg98.onrender.com";

let texto = "";
let textoFinal = "";

// LOGIN
function login(){
let rol = document.getElementById("rol").value;
let pass = document.getElementById("pass").value;

if(!rol || !pass){
document.getElementById("error").innerText="Complete los datos";
return;
}

document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
document.getElementById("usuario").innerText="Rol: " + rol;
}

// ANALIZAR
async function analizar(){

let caso = document.getElementById("caso").value.toLowerCase();

if(!caso){
alert("Debe ingresar un caso");
return;
}

// MOSTRAR LOADER
document.getElementById("loader").classList.remove("hidden");

// MENSAJES DINÁMICOS
let mensajes = [
"Analizando comportamiento...",
"Revisando normativa...",
"Aplicando Ley 1620...",
"Generando acta..."
];

let i = 0;

let intervalo = setInterval(()=>{
document.getElementById("textoLoader").innerText = "🔄 " + mensajes[i % mensajes.length];
i++;
},1500);

// RESPUESTA RÁPIDA
let respuestaRapida = "";

if(caso.includes("insulto") || caso.includes("groser")){
respuestaRapida = "TIPO II - Agresión verbal\n\nSe requiere llamado de atención y seguimiento.";
}
else if(caso.includes("golpe") || caso.includes("pelea")){
respuestaRapida = "TIPO III - Agresión física\n\nSe activa ruta disciplinaria.";
}

if(respuestaRapida !== ""){
texto = respuestaRapida;
mostrar(texto);
clearInterval(intervalo);
document.getElementById("loader").classList.add("hidden");
return;
}

// IA
try{
const res = await fetch(URL + "/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({caso})
});

const data = await res.json();

texto = data.respuesta;

mostrar(texto);

}catch(e){
mostrar("⚠️ Error de conexión con el servidor");
}

clearInterval(intervalo);
document.getElementById("loader").classList.add("hidden");
}

// MOSTRAR
function mostrar(t){
preview.innerHTML = `
<center>
<img src="escudo.png" width="80"><br>
<b>ACTA DE CONVIVENCIA</b><br><hr>
</center>
<p>${t.replace(/\n/g,"<br>")}</p>
`;
preview.classList.remove("hidden");
}

// EDITAR
function editar(){
editor.value = texto;
editor.classList.remove("hidden");
}

function guardar(){
textoFinal = editor.value;
mostrar(textoFinal);
}

</script>

</body>
</html>
