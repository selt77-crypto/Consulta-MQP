<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convivencia Escolar Institucional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#1e3a8a;
color:white;
}

.container{
max-width:900px;
margin:auto;
background:white;
color:black;
padding:25px;
margin-top:30px;
border-radius:12px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
}

button{
background:#f1c40f;
padding:10px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

#resultado,#citacion{
background:#f4f4f4;
padding:20px;
margin-top:15px;
white-space:pre-wrap;
border-left:5px solid #1e3a8a;
}
</style>
</head>

<body>

<div class="container">

<h2>Gestión de Convivencia Escolar</h2>

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option>Pre-escolar</option><option>1°</option><option>2°</option>
<option>3°</option><option>4°</option><option>5°</option>
<option>6°1</option><option>6°2</option>
<option>7°1</option><option>7°2</option>
<option>8°1</option><option>8°2</option>
<option>9°1</option><option>9°2</option><option>9°3</option>
<option>10°1</option><option>10°2</option>
<option>11°1</option><option>11°2</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<label>Fecha citación</label>
<input type="date" id="fecha">

<label>Hora citación</label>
<input type="time" id="hora">

<button onclick="analizar()">Analizar</button>
<button onclick="generarCitacion()">Citación</button>
<button onclick="pdfActa()">PDF Acta</button>
<button onclick="pdfCitacion()">PDF Citación</button>

<div id="resultado"></div>
<div id="citacion"></div>

</div>

<script>

const { jsPDF } = window.jspdf;

// 🧠 MOTOR EXPERTO
function analizar(){

let nombre=val("nombre");
let grado=val("grado");
let caso=val("caso").toLowerCase();

if(!nombre||!caso){
alert("Complete todos los campos");
return;
}

// 🔎 CLASIFICACIÓN INTELIGENTE
let tipo, analisis, ruta, medidas, citacion;

if(/arma|droga|lesión|grave|policía/.test(caso)){
tipo="Tipo III – Situación grave";
analisis="Conducta que afecta gravemente la integridad física o la convivencia escolar.";
ruta="- Activación inmediata del Comité de Convivencia\n- Remisión a entidades externas";
medidas="- Citación inmediata a acudiente\n- Registro disciplinario\n- Posibles sanciones institucionales";
citacion="OBLIGATORIA";
}
else if(/golpe|agredir|groser|reiter|irrespeto/.test(caso)){
tipo="Tipo II – Afecta la convivencia";
analisis="Conducta reiterada que afecta el ambiente escolar y el respeto.";
ruta="- Registro en observador\n- Seguimiento por coordinación";
medidas="- Compromiso pedagógico\n- Actividades formativas\n- Seguimiento";
citacion="RECOMENDADA";
}
else{
tipo="Tipo I – Situación leve";
analisis="Conducta ocasional que puede corregirse pedagógicamente.";
ruta="- Manejo en aula\n- Seguimiento docente";
medidas="- Llamado de atención\n- Orientación pedagógica";
citacion="NO NECESARIA";
}

// 📄 ACTA PROFESIONAL
let texto=`
ACTA DE CONVIVENCIA

Fecha: ${new Date().toLocaleDateString()}
Hora: ${new Date().toLocaleTimeString()}

Estudiante: ${nombre}
Grado: ${grado}

Descripción:
${caso}

Clasificación:
${tipo}

Análisis pedagógico:
${analisis}

Ruta de atención:
${ruta}

Medidas pedagógicas:
${medidas}

Decisión sobre citación:
${citacion}

Fundamento legal:
Ley 1620 de 2013
Decreto 1965 de 2013

Firmas:

Docente: _______________________
Coordinación: __________________
Rectoría: ______________________
`;

resultado.innerText=texto;
}

// 📩 CITACIÓN
function generarCitacion(){

let nombre=val("nombre");
let grado=val("grado");
let caso=val("caso");
let fecha=val("fecha");
let hora=val("hora");

if(!fecha||!hora){
alert("Ingrese fecha y hora");
return;
}

let texto=`
CITACIÓN A ACUDIENTE

Fecha: ${fecha}
Hora: ${hora}

Estudiante: ${nombre}
Grado: ${grado}

Motivo:
${caso}

Se solicita su presencia para atender la situación presentada.

Atentamente,

Docente: _______________________
Coordinación: __________________
Rectoría: ______________________
`;

citacion.innerText=texto;
}

// 📄 PDF
function crearPDF(texto,nombre){

let doc=new jsPDF();
doc.setFont("Times","Normal");
doc.setFontSize(11);

let lineas=doc.splitTextToSize(texto,170);
let y=30;

lineas.forEach(linea=>{
if(y>270){
doc.addPage();
y=20;
}
doc.text(linea,20,y);
y+=7;
});

doc.save(nombre+".pdf");
}

function pdfActa(){
crearPDF(resultado.innerText,"acta");
}

function pdfCitacion(){
crearPDF(citacion.innerText,"citacion");
}

function val(id){
return document.getElementById(id).value.trim();
}

</script>

</body>
</html>
