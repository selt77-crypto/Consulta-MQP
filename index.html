<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convivencia Escolar PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('fondo_estudiantes.jpg');
background-size:cover;
color:white;
}
.container{
max-width:900px;
margin:auto;
background:white;
color:black;
padding:30px;
margin-top:40px;
border-radius:15px;
}
input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
}
button{
background:gold;
padding:10px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}
#resultado{
white-space:pre-wrap;
background:#f4f4f4;
padding:20px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Asesor de Convivencia Escolar</h2>

<input id="nombre" placeholder="Nombre">
<select id="grado">
<option>Pre-escolar</option><option>1°</option><option>2°</option>
<option>3°</option><option>4°</option><option>5°</option>
<option>6°1</option><option>7°1</option><option>8°1</option>
<option>9°1</option><option>10°1</option><option>11°1</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<button onclick="analizar()">Analizar</button>
<button onclick="generarCitacion()">Citación</button>
<button onclick="pdf()">PDF</button>

<div id="resultado"></div>

</div>

<script>

const { jsPDF } = window.jspdf;
const URL="https://consulta-backend-eg98.onrender.com";

async function analizar(){

try{

let nombre=document.getElementById("nombre").value.trim();
let grado=document.getElementById("grado").value;
let caso=document.getElementById("caso").value.trim();

if(!nombre||!caso){
alert("Complete todos los campos");
return;
}

let res=await fetch(URL+"/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre,grado,caso})
});

let data=await res.json();

if(data.error){
alert(data.error);
return;
}

resultado.innerText=data.resultado;

}catch(e){
alert("Error de conexión con el servidor");
}
}

// 📄 PDF SIN CORTES
function pdf(){

let doc=new jsPDF();
let texto=resultado.innerText;
let lineas=doc.splitTextToSize(texto,180);

let y=30;
let pagina=1;

function encabezado(){
doc.setFontSize(10);
doc.text("INSTITUCIÓN EDUCATIVA",10,10);
}

function pie(){
doc.text("Página "+pagina,180,290);
}

encabezado();

lineas.forEach(linea=>{
if(y>270){
pie();
doc.addPage();
pagina++;
encabezado();
y=30;
}
doc.text(linea,10,y);
y+=7;
});

pie();

doc.save("acta.pdf");
}

// 📩 CITACIÓN AUTOMÁTICA
function generarCitacion(){

let texto=`
CITACIÓN A ACUDIENTES/PADRES DE FAMILIA

Estudiante: ${nombre.value}

Motivo:
${caso.value}

Se solicita su حضور para atención del caso.

Firma Docente: ____________
Firma Coordinación: ____________
Firma Rector (si aplica): ______________
`;

resultado.innerText=texto;
}

</script>

</body>
</html>
