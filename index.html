<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Convivencia</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.container{
    background:white;
    color:black;
    max-width:600px;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

input, textarea, select{
    width:100%;
    margin:10px 0;
    padding:10px;
}

button{
    background:gold;
    padding:10px;
    border:none;
    cursor:pointer;
}

#resultado{
    margin-top:20px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Sistema de Convivencia Escolar</h1>

<div class="container">

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option value="">Seleccione grado</option>
<option>6°1</option>
<option>7°1</option>
<option>8°1</option>
<option>9°1</option>
<option>10°1</option>
<option>11°1</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<button onclick="analizar()">Analizar</button>

<div id="resultado"></div>

</div>

<script>

const URL = "https://consulta-backend-eg98.onrender.com";

async function analizar(){

let nombre = document.getElementById("nombre").value;
let grado = document.getElementById("grado").value;
let caso = document.getElementById("caso").value;

if(!nombre || !grado || !caso){
alert("Complete todos los campos");
return;
}

document.getElementById("resultado").innerText = "Analizando...";

try{

let res = await fetch(URL + "/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre, grado, caso})
});

let data = await res.json();

document.getElementById("resultado").innerText =
`ACTA DE CONVIVENCIA

Estudiante: ${nombre}
Grado: ${grado}

${data.resultado}`;

}catch{
document.getElementById("resultado").innerText = "Error de conexión";
}

}

</script>

</body>
</html>
