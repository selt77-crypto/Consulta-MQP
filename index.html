<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Institucional de Convivencia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('fondo_estudiantes.jpg');
background-size:cover;
color:white;
}

/* LOGIN */
.login{
max-width:400px;
margin:100px auto;
background:white;
color:black;
padding:30px;
border-radius:12px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
color:black;
padding:30px;
margin-top:30px;
border-radius:15px;
display:none;
}

.logo{
width:90px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#f1c40f;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

#resultado,#citacion{
background:#f4f4f4;
padding:20px;
margin-top:15px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login" id="loginBox">
<h2>Ingreso al sistema</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p id="error" style="color:red;"></p>
</div>

<!-- 🏫 SISTEMA -->
<div class="container" id="app">

<img src="escudo.png" class="logo">

<h2>Convivencia Escolar</h2>
<p id="rol"></p>

<input id="nombre" placeholder="Nombre estudiante">

<select id="grado">
<option>Pre-escolar</option><option>1°</option><option>2°</option>
<option>3°</option><option>4°</option><option>5°</option>
<option>6°1</option><option>7°1</option><option>8°1</option>
<option>9°1</option><option>10°1</option><option>11°1</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<label>Fecha citación</label>
<input type="date" id="fecha">

<label>Hora citación</label>
<input type="time" id="hora">

<button onclick="analizar()">Analizar</button>
<button onclick="generarCitacion()">Citación</button>
<button onclick="pdfActa()">PDF Acta</button>

<div id="resultado"></div>
<div id="citacion"></div>

</div>

<script>

const { jsPDF } = window.jspdf;

// 🔐 USUARIOS
const usuarios={
"docente":"1234",
"coordinador":"1234",
"rector":"1234"
};

let rolActual="";

// 🔐 LOGIN
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(usuarios[u] && usuarios[u]===p){

rolActual=u;

loginBox.style.display="none";
app.style.display="block";

rol.innerText="Rol: "+u;

}else{
error.innerText="Usuario o contraseña incorrectos";
}
}

// 🧠 ANALIZAR
function analizar(){

let nombre=val("nombre");
let grado=val("grado");
let caso=val("caso").toLowerCase();

let tipo="Tipo I";

if(/golpe|agredir/.test(caso)){
tipo="Tipo III";
}
else if(/groser|irrespeto/.test(caso)){
tipo="Tipo II";
}

let texto=`
ACTA DE CONVIVENCIA

Fecha: ${new Date().toLocaleDateString()}
Hora: ${new Date().toLocaleTimeString()}

Usuario: ${rolActual}

Estudiante: ${nombre}
Grado: ${grado}

Descripción:
${caso}

Clasificación:
${tipo}
`;

resultado.innerText=texto;
}

// 📩 CITACIÓN
function generarCitacion(){

let nombre=val("nombre");
let grado=val("grado");
let fecha=val("fecha");
let hora=val("hora");

let texto=`
CITACIÓN

Fecha: ${fecha}
Hora: ${hora}

Estudiante: ${nombre}
Grado: ${grado}

Atentamente
${rolActual}
`;

citacion.innerText=texto;
}

// 📄 PDF
function pdfActa(){

let doc=new jsPDF();
doc.text(resultado.innerText,10,10);
doc.save("acta.pdf");
}

function val(id){
return document.getElementById(id).value;
}

</script>

</body>
</html>
