<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asesor de Convivencia Escolar</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('fondo_estudiantes.jpg');
background-size:cover;
color:white;
}

/* LOGIN */
#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
margin:5px;
}

.container{
display:none;
max-width:900px;
margin:30px auto;
background:white;
color:black;
padding:30px;
border-radius:20px;
}

textarea, select{
width:100%;
margin:10px 0;
padding:10px;
}

button{
background:#f4c400;
border:none;
padding:10px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

button:active{transform:scale(0.95);}

#resultado{
margin-top:20px;
background:#f4f4f4;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Ingreso al sistema</h2>
<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div class="container" id="app">

<h2 id="rol"></h2>

<input id="nombre" placeholder="Nombre del estudiante">

<select id="grado">
<option value="">Seleccione grado</option>
<option>6°1</option><option>7°1</option>
<option>8°1</option><option>9°1</option>
<option>10°1</option><option>11°1</option>
</select>

<textarea id="caso" placeholder="Describa el caso"></textarea>

<button onclick="analizar()">Analizar</button>
<button onclick="pdf()">PDF</button>
<button onclick="citacion()">Citación</button>

<div id="resultado"></div>

</div>

<script>

const { jsPDF } = window.jspdf;
const URL = "https://consulta-backend-eg98.onrender.com";

// 🔐 USUARIOS (LOCAL)
const usuarios = {
docente:{pass:"123", rol:"Docente"},
coordinador:{pass:"123", rol:"Coordinador"},
rector:{pass:"123", rol:"Rector"}
};

// LOGIN
function login(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(usuarios[u] && usuarios[u].pass===p){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("rol").innerText = "Rol: " + usuarios[u].rol;

}else{
alert("Datos incorrectos");
}

}

// ANALIZAR
async function analizar(){

let nombre = document.getElementById("nombre").value;
let grado = document.getElementById("grado").value;
let caso = document.getElementById("caso").value;

let fecha = new Date().toLocaleDateString();

let res = await fetch(URL+"/analizar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({nombre, grado, caso})
});

let data = await res.json();

resultado.innerText =
`ACTA DE CONVIVENCIA

INSTITUCIÓN EDUCATIVA MANUEL QUINTERO PENILLA

Fecha: ${fecha}

Estudiante: ${nombre}
Grado: ${grado}

Descripción:
${caso}

${data.resultado}

Firma Docente: ____________________
Firma Coordinador: ____________________
Firma Psicoorientador: ____________________
Firma Rector: ____________________
`;
}

// PDF CON ESCUDO
function pdf(){

let doc = new jsPDF();

doc.addImage("escudo.png","PNG",90,10,30,30);

doc.setFontSize(14);
doc.text("ACTA DE CONVIVENCIA", 60, 50);

doc.setFontSize(10);
doc.text(resultado.innerText,10,70);

// marca de agua
doc.setTextColor(200,200,200);
doc.text("M.Q.P",80,150,{angle:45});

doc.save("acta.pdf");
}

// CITACIÓN
function citacion(){

let doc = new jsPDF();

doc.addImage("escudo.png","PNG",90,10,30,30);

doc.text("CITACIÓN A PADRES DE FAMILIA", 40, 50);

doc.text("Estudiante: "+document.getElementById("nombre").value,20,80);

doc.text("Motivo:",20,100);
doc.text(document.getElementById("caso").value,20,110);

doc.text("Fecha: ____________________",20,140);

doc.text("Firma Docente: ____________________",20,170);
doc.text("Firma Coordinación: ____________________",20,190);

doc.save("citacion.pdf");
}

</script>

</body>
</html>
