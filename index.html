<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asesor de Convivencia Escolar</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    background: white;
    color: black;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    font-size: 16px;
}

button {
    background: gold;
    border: none;
    padding: 12px 20px;
    font-size: 18px;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

#resultado {
    margin-top: 20px;
    white-space: pre-wrap;
    text-align: left;
    background: #f4f4f4;
    padding: 15px;
}
</style>

</head>

<body>

<div class="container">

<h2>Asesor de Convivencia Escolar</h2>

<p><b>Instrucciones:</b><br>
1. Ingrese el nombre del estudiante<br>
2. Seleccione el grado<br>
3. Describa el caso<br>
4. Presione analizar
</p>

<!-- Nombre -->
<input type="text" id="nombre" placeholder="Nombre del estudiante">

<!-- NUEVO CAMPO GRADO -->
<select id="grado">
<option value="">Seleccione el grado</option>
<option>Pre-escolar</option>
<option>1°</option>
<option>2°</option>
<option>3°</option>
<option>4°</option>
<option>5°</option>
<option>6°1</option>
<option>6°2</option>
<option>7°1</option>
<option>7°2</option>
<option>8°1</option>
<option>8°2</option>
<option>9°1</option>
<option>9°2</option>
<option>9°3</option>
<option>10°1</option>
<option>10°2</option>
<option>11°1</option>
<option>11°2</option>
</select>

<!-- Caso -->
<textarea id="caso" rows="5" placeholder="Describa el caso de convivencia"></textarea>

<button onclick="analizarCaso()">Analizar</button>

<div id="resultado"></div>

</div>

<script>

const URL = "https://consulta-backend-eg98.onrender.com";

async function analizarCaso() {

    const nombre = document.getElementById("nombre").value;
    const grado = document.getElementById("grado").value;
    const caso = document.getElementById("caso").value;

    if (!nombre || !grado || !caso) {
        alert("Por favor complete todos los campos");
        return;
    }

    document.getElementById("resultado").innerText = "⏳ Analizando caso...";

    try {

        const res = await fetch(URL + "/analizar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nombre, grado, caso })
        });

        const data = await res.json();

        // 🔥 ACTA FINAL CON GRADO
        document.getElementById("resultado").innerText = `
ACTA DE CONVIVENCIA

Institución Educativa Técnico Empresarial Manuel Quintero Penilla

Estudiante: ${nombre}
Grado: ${grado}

Descripción del caso:
${caso}

${data.resultado}
        `;

    } catch (error) {
        document.getElementById("resultado").innerText =
        "⚠️ El servidor está iniciando. Intenta nuevamente en unos segundos.";
    }
}

</script>

</body>
</html>
